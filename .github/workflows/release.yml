name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ── CI: lint + test + build (every push and PR) ────────────────────────────
  build:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (type-check)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CLI entry point
        run: node dist/cli.js --version

      - name: Verify MCP server exists
        run: test -f mcp/server.py && echo "server.py OK"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 3

  # ── Release: npm + GitHub Packages + vsce + GitHub Release ────────────────
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION OK"

      # ── 1 of 4: Publish to npm ─────────────────────────────────────────────
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 2 of 4: Publish to GitHub Packages ────────────────────────────────
      - name: Set up Node.js (GitHub Packages)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.publishConfig = { registry: 'https://npm.pkg.github.com', access: 'public' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 3 of 4: VS Code Marketplace ───────────────────────────────────────
      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VS Code extension
        run: vsce package --out claude-project-${{ steps.version.outputs.VERSION }}.vsix

      - name: Publish to VS Code Marketplace
        run: vsce publish --pat ${{ secrets.VSCE_PAT }}
        continue-on-error: true

      # ── 4 of 4: GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            claude-project-${{ steps.version.outputs.VERSION }}.vsix
          body: |
            ## claude-project v${{ steps.version.outputs.VERSION }}

            ### Install

            **npm:**
            ```bash
            npm install -g claude-project
            ```

            **GitHub Packages:**
            ```bash
            npm install -g claude-project --registry https://npm.pkg.github.com
            ```

            **VS Code:** Search `claudelab.claude-project` in Extensions, or install the `.vsix` file attached below.

            **MCP server (add to `~/.mcp.json`):**
            ```json
            { "mcpServers": { "claude-project": { "command": "claude-project", "args": ["mcp"] } } }
            ```

            ---
            Full changelog: https://github.com/infraax/claude-project#changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
