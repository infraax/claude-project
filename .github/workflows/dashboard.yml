name: Deploy Firebase

on:
  push:
    branches: [main]
    paths:
      - 'public/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-firebase:
    runs-on: ubuntu-latest
    # Set FIREBASE_ENABLED repository variable to 'true' to activate
    if: ${{ vars.FIREBASE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting:claudeproject \
            --project claude-1bf44 \
            --token "$FIREBASE_TOKEN" \
            --non-interactive
