name: Infrastructure Health Check

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install git-crypt
        run: sudo apt-get install -y git-crypt -q

      - name: Unlock secrets
        env:
          GIT_CRYPT_KEY_B64: ${{ secrets.GIT_CRYPT_KEY_B64 }}
        run: |
          echo "$GIT_CRYPT_KEY_B64" | base64 -d > /tmp/gc.key
          git-crypt unlock /tmp/gc.key
          rm -f /tmp/gc.key

      - run: npm ci

      - name: Run infrastructure test
        run: bash scripts/test-infrastructure.sh 2>&1 | tee health-report.txt
        continue-on-error: true

      - name: Post summary
        if: always()
        run: |
          echo "## Infrastructure Health" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 health-report.txt >> $GITHUB_STEP_SUMMARY || echo "No report generated" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-report-${{ github.run_id }}
          path: health-report.txt
          retention-days: 14
